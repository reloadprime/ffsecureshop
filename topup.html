<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Up - FF Secure Shop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #00d9ff, #8b5cf6);
      min-height: 100vh;
      padding: 20px;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 18px;
      padding: 14px 16px;
      backdrop-filter: blur(4px);
    }

    .brand {
      font-size: 22px;
      font-weight: bold;
      color: white;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .nav-links a,
    .cart-btn,
    .cart-order-btn,
    .add-btn,
    .buy-btn {
      text-decoration: none;
      background: #27d7eb;
      color: #001b22;
      font-weight: bold;
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 14px;
      box-shadow: 0 0 14px rgba(20, 231, 255, 0.35);
      cursor: pointer;
    }

    .nav-links a,
    .cart-btn {
      padding: 10px 14px;
      font-size: 14px;
    }

    .cart-btn {
      position: relative;
    }

    .cart-count {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #ff3b6b;
      color: white;
      min-width: 22px;
      height: 22px;
      border-radius: 50%;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      padding: 0 6px;
    }

    .top-box {
