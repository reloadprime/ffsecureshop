<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Fire - Reload Prime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      font-family:Arial,sans-serif;
      min-height:100vh;
      color:#fff;
      background:
        radial-gradient(circle at top left, rgba(0,255,255,0.12), transparent 24%),
        radial-gradient(circle at top right, rgba(0,102,255,0.14), transparent 28%),
        linear-gradient(180deg,#020814 0%, #03122b 45%, #020914 100%);
    }
    .brand-bar{
      min-height:64px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 16px;
      border-bottom:1px solid rgba(255,255,255,0.06);
      background:linear-gradient(90deg, rgba(0,255,255,0.07), rgba(0,98,255,0.03) 55%, rgba(0,0,0,0));
      position:sticky;
      top:0;
      z-index:10;
      backdrop-filter:blur(6px);
    }
    .brand-link{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;min-width:0}
    .brand-logo{width:34px;height:34px;object-fit:cover;border-radius:9px;box-shadow:0 0 12px rgba(39,220,255,0.18);background:#0b1220}
    .brand-name{font-family:'Orbitron',Arial,sans-serif;font-size:14px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;line-height:1;display:flex;gap:6px;white-space:nowrap}
    .reload{color:#fff}.prime{color:#42b8ff;text-shadow:0 0 10px rgba(66,184,255,.28)}
    .quick-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
    .quick-action-btn,.top-icon-btn{
      position:relative;
      width:38px;height:38px;border:none;border-radius:13px;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);
      color:#eef7ff;display:flex;align-items:center;justify-content:center;cursor:pointer;
      box-shadow:0 8px 18px rgba(0,0,0,.20);
      text-decoration:none;
    }
    .quick-action-btn svg,.top-icon-svg{width:20px;height:20px;display:block;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .quick-badge{
      position:absolute;top:-5px;right:-5px;min-width:17px;height:17px;padding:0 5px;border-radius:999px;
      background:#25a7ff;color:#fff;font-size:10px;font-weight:900;display:none;align-items:center;justify-content:center;
      box-shadow:0 0 0 2px #071427;
    }
    .quick-badge.show{display:flex}
    .container{max-width:760px;margin:0 auto;padding:16px 16px 32px}
    .hero{
      border-radius:24px;
      padding:0;
      margin-bottom:16px;
      background:linear-gradient(135deg, rgba(0,255,255,.08), rgba(0,98,255,.09));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 14px 34px rgba(0,0,0,.25);
      overflow:hidden;
      position:relative;
    }
.hero h1{font-size:34px;font-weight:900;margin-bottom:8px;line-height:1.05}
    .hero p{font-size:15px;line-height:1.45;color:rgba(255,255,255,.78);max-width:520px}

    .ff-banner-img{
      display:block;
      width:100%;
      height:auto;
      border-radius:24px 24px 0 0;
    }
    .hero-content{
      padding:18px;
      background:linear-gradient(180deg,rgba(5,10,20,.98),rgba(5,10,20,1));
    }

    .tabs{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin:18px 0;
    }
    .tab-btn{
      border:none;
      border-radius:16px;
      padding:13px 10px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color:#fff;
      font-weight:900;
      cursor:pointer;
    }
    .tab-btn.active{
      background:linear-gradient(90deg,#0f7cff,#33b5ff);
      color:#06111f;
      box-shadow:0 10px 20px rgba(15,124,255,.22);
    }
    .section-title{font-size:22px;font-weight:900;margin:18px 0 12px}
    .offers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .offer-card{
      border-radius:20px;
      padding:14px;
      background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.025)),linear-gradient(135deg,rgba(0,255,255,.045),rgba(0,98,255,.035));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 10px 24px rgba(0,0,0,.22);
    }
    .diamonds{font-size:21px;font-weight:900;margin-bottom:6px}
    .type{font-size:11px;letter-spacing:1.1px;color:rgba(255,255,255,.62);text-transform:uppercase;font-weight:900;margin-bottom:10px}
    .price{font-size:18px;font-weight:900;color:#55d7ff;margin-bottom:12px}
    .add-btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:11px 10px;
      font-size:13px;
      font-weight:900;
      cursor:pointer;
      color:#06111f;
      background:linear-gradient(90deg,#0f7cff,#33b5ff);
      box-shadow:0 8px 18px rgba(15,124,255,.24);
    }
    .panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .22s ease;z-index:40}
    .panel-overlay.show{opacity:1;pointer-events:auto}
    .app-panel{
      position:fixed;top:16px;left:16px;right:16px;max-width:420px;margin-left:auto;
      padding:16px;border-radius:22px;border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03)),linear-gradient(135deg,rgba(0,255,255,.06),rgba(0,98,255,.07));
      box-shadow:0 18px 40px rgba(0,0,0,.35);backdrop-filter:blur(12px);
      transform:translateY(-14px) scale(.98);opacity:0;pointer-events:none;transition:transform .22s ease,opacity .22s ease;
      z-index:42;max-height:82vh;overflow:auto;
    }
    .app-panel.show{transform:translateY(0) scale(1);opacity:1;pointer-events:auto}
    .app-panel-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
    .app-panel-header h3{font-size:20px;font-weight:900}
    .app-panel-close{width:34px;height:34px;border:none;border-radius:12px;background:rgba(255,255,255,.06);color:#fff;font-size:22px;line-height:1;cursor:pointer}
    .panel-card{padding:14px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);box-shadow:inset 0 1px 0 rgba(255,255,255,.04);margin-bottom:10px}
    .empty-state{padding:18px 14px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.80);text-align:center;font-size:14px;line-height:1.45}
    .cart-list,.notification-list{display:grid;gap:10px}
    .cart-game-title{font-size:15px;font-weight:900;color:#fff;margin:4px 0 8px}
    .cart-item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:12px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);margin-bottom:9px}
    .cart-pack{font-weight:900;font-size:14px;color:#fff;margin-bottom:4px}
    .cart-price{font-size:13px;color:rgba(255,255,255,.75)}
    .qty-row{display:flex;align-items:center;gap:8px;margin-top:8px}
    .qty-btn{width:28px;height:28px;border:none;border-radius:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);color:#fff;font-size:18px;font-weight:900;cursor:pointer}
    .qty-value{min-width:22px;text-align:center;font-weight:900;font-size:13px}
    .delete-cart-btn{width:38px;height:38px;border:none;border-radius:13px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.10);color:rgba(255,255,255,.82);display:flex;align-items:center;justify-content:center;cursor:pointer}
    .delete-cart-btn svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .cart-total{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding:14px;border-radius:16px;background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.16);font-weight:900}
    .primary-btn{width:100%;border:none;border-radius:14px;padding:13px 14px;font-size:14px;font-weight:900;cursor:pointer;color:#06111f;background:linear-gradient(90deg,#0f7cff,#33b5ff);box-shadow:0 10px 20px rgba(15,124,255,.28);margin-top:12px}
    .toast{
      position:fixed;left:16px;right:16px;bottom:22px;z-index:60;
      padding:13px 14px;border-radius:16px;background:rgba(0,229,255,.12);
      border:1px solid rgba(0,229,255,.24);color:#dffaff;text-align:center;font-weight:900;
      opacity:0;transform:translateY(12px);pointer-events:none;transition:.22s ease;
    }
    .toast.show{opacity:1;transform:translateY(0)}
    [hidden]{display:none!important}
    @media(max-width:420px){
      .container{padding:14px 14px 28px}
      .hero h1{font-size:32px}
      .offers-grid{gap:10px}
      .offer-card{padding:12px;border-radius:18px}
      .diamonds{font-size:19px}
      .price{font-size:16px}
      .brand-name{font-size:13px}
      .quick-action-btn,.top-icon-btn{width:36px;height:36px}
      .app-panel{top:12px;left:12px;right:12px;padding:14px;border-radius:20px}
    }
  
    .menu-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .22s ease;z-index:40;
    }
    .menu-overlay.show{opacity:1;pointer-events:auto}
    .side-menu{
      position:fixed;top:0;right:0;width:min(86vw,330px);height:100vh;padding:18px 16px 22px;
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03)),linear-gradient(180deg,#071427 0%,#06111f 100%);
      border-left:1px solid rgba(255,255,255,.08);box-shadow:-20px 0 40px rgba(0,0,0,.35);
      transform:translateX(100%);transition:transform .25s ease;z-index:41;overflow-y:auto;
    }
    .side-menu.show{transform:translateX(0)}
    .side-menu-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .side-menu-title{font-family:'Orbitron',Arial,sans-serif;font-size:18px;font-weight:800;letter-spacing:1px}
    .side-menu-close{width:34px;height:34px;border:none;border-radius:12px;background:rgba(255,255,255,.06);color:#fff;font-size:22px;line-height:1;cursor:pointer}
    .menu-list{display:grid;gap:10px}
    .menu-item{width:100%;display:flex;align-items:center;justify-content:space-between;color:#fff;font-size:15px;font-weight:800;padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);box-shadow:inset 0 1px 0 rgba(255,255,255,.04);cursor:pointer;text-decoration:none}
    .menu-item-main{display:flex;align-items:center;gap:12px;min-width:0}
    .menu-icon{width:22px;height:22px;flex:0 0 22px;display:block;opacity:.92}
    .menu-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hero h1{
        font-size:32px !important;
      }
    }

  </style>
</head>
<body>
  <!-- Image utilisée par le bloc Free Fire : ff-banner.jpg doit être placé dans le même dossier que freefire.html -->
  <div class="brand-bar">
    <a class="brand-link" href="index.html">
      <img src="logo.jpg" alt="Reload Prime Logo" class="brand-logo">
      <div class="brand-name"><span class="reload">Reload</span><span class="prime">Prime</span></div>
    </a>
    <div class="quick-actions">
      <button class="quick-action-btn" type="button" data-panel="panel-cart" aria-label="Ouvrir le panier">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6h15l-1.6 8.2a2 2 0 0 1-2 1.6H9.1a2 2 0 0 1-2-1.7L5.3 3.8H3"></path><circle cx="9.5" cy="20" r="1.3"></circle><circle cx="17.5" cy="20" r="1.3"></circle></svg>
        <span class="quick-badge" id="cartBadge">0</span>
      </button>
      <button class="quick-action-btn" type="button" data-panel="panel-notifications" aria-label="Ouvrir les notifications">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"></path><path d="M10 21h4"></path></svg>
        <span class="quick-badge" id="notificationBadge">0</span>
      </button>
      <button class="top-icon-btn" id="openMenuBtn" type="button" aria-label="Ouvrir le menu">
        <svg viewBox="0 0 24 24" class="top-icon-svg" aria-hidden="true"><path d="M4 7.25h16M4 12h16M4 16.75h16"></path></svg>
      </button>
    </div>
  </div>


  <div class="menu-overlay" id="menuOverlay"></div>
  <aside class="side-menu" id="sideMenu" aria-hidden="true">
    <div class="side-menu-header">
      <div class="side-menu-title">Menu</div>
      <button class="side-menu-close" id="closeMenuBtn" type="button" aria-label="Fermer le menu">×</button>
    </div>
    <nav class="menu-list">
      <a class="menu-item" href="index.html">
        <span class="menu-item-main">
          <svg class="menu-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6h-4v6H5a1 1 0 0 1-1-1v-9.5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          <span class="menu-text">Accueil</span>
        </span>
      </a>
      <button class="menu-item" type="button">
        <span class="menu-item-main">
          <svg class="menu-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7.2 9.2h9.6c2.2 0 4 1.8 4 4v1.5c0 1.7-1.4 3.1-3.1 3.1-.9 0-1.7-.4-2.3-1.1l-.9-1.1h-5l-.9 1.1a3 3 0 0 1-2.3 1.1 3.1 3.1 0 0 1-3.1-3.1v-1.5c0-2.2 1.8-4 4-4Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M8.3 13.4h3.2M9.9 11.8V15M16.6 12.6h.01M18.1 14.2h.01" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
          <span class="menu-text">Jeux</span>
        </span>
      </button>
      <button class="menu-item" type="button" data-panel="panel-history">
        <span class="menu-item-main">
          <svg class="menu-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7L3 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 4v4h4M12 7v5l3 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="menu-text">Historique</span>
        </span>
      </button>
      <a class="menu-item" href="index.html">
        <span class="menu-item-main">
          <svg class="menu-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21a8 8 0 0 0-16 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span class="menu-text">Compte</span>
        </span>
      </a>
      <a class="menu-item" href="index.html">
        <span class="menu-item-main">
          <svg class="menu-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v7A2.5 2.5 0 0 1 17.5 16H9l-5 4v-13.5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          <span class="menu-text">Contact</span>
        </span>
      </a>
    </nav>
  </aside>

  <div class="panel-overlay" id="panelOverlay"></div>

  <section class="app-panel" id="panel-cart" aria-hidden="true">
    <div class="app-panel-header">
      <h3>Panier</h3>
      <button class="app-panel-close" type="button" data-close-panel>×</button>
    </div>
    <div class="panel-card" id="cartEmptyState"><div class="empty-state">Votre panier est vide.</div></div>
    <div class="panel-card" id="cartContent" hidden>
      <div class="cart-list" id="cartList"></div>
      <div class="cart-total"><span>Total général</span><span id="cartTotal">0 Ar</span></div>
      <button type="button" class="primary-btn">Passer au paiement</button>
    </div>
  </section>

  <section class="app-panel" id="panel-notifications" aria-hidden="true">
    <div class="app-panel-header">
      <h3>Notifications</h3>
      <button class="app-panel-close" type="button" data-close-panel>×</button>
    </div>
    <div class="panel-card" id="notificationsEmptyState"><div class="empty-state">Aucune notification.</div></div>
    <div class="panel-card" id="notificationsContent" hidden><div class="notification-list" id="notificationList"></div></div>
  </section>


  <section class="app-panel" id="panel-history" aria-hidden="true">
    <div class="app-panel-header">
      <h3>Historique</h3>
      <button class="app-panel-close" type="button" data-close-panel>×</button>
    </div>
    <div class="panel-card">
      <div class="empty-state">Aucun historique pour le moment.</div>
    </div>
  </section>

  <main class="container">
    <section class="hero">
      <img class="ff-banner-img" src="ff-banner.jpg" alt="Free Fire">
      <div class="hero-content">
        <h1>Free Fire</h1>
        <p>Choisissez votre pack diamonds.</p>
      </div>
    </section>

    <div class="tabs">
      <button class="tab-btn active" type="button" data-tab="uid">Recharge</button>
      <button class="tab-btn" type="button" data-tab="account">Abonnement</button>
    </div>

    <section id="uidOffers">
      <h2 class="section-title">Recharge</h2>
      <div class="offers-grid" id="uidGrid"></div>
    </section>

    <section id="accountOffers" hidden>
      <h2 class="section-title">Abonnement</h2>
      <div class="offers-grid" id="accountGrid"></div>
    </section>
  </main>

  <div class="toast" id="toast">Ajouté au panier</div>

  <script>

    const openMenuBtn = document.getElementById("openMenuBtn");
    const closeMenuBtn = document.getElementById("closeMenuBtn");
    const sideMenu = document.getElementById("sideMenu");
    const menuOverlay = document.getElementById("menuOverlay");

    function openMenu(){
      if(!sideMenu || !menuOverlay) return;
      sideMenu.classList.add("show");
      menuOverlay.classList.add("show");
      sideMenu.setAttribute("aria-hidden","false");
    }

    function closeMenu(){
      if(!sideMenu || !menuOverlay) return;
      sideMenu.classList.remove("show");
      menuOverlay.classList.remove("show");
      sideMenu.setAttribute("aria-hidden","true");
    }

    if(openMenuBtn) openMenuBtn.addEventListener("click", openMenu);
    if(closeMenuBtn) closeMenuBtn.addEventListener("click", closeMenu);
    if(menuOverlay) menuOverlay.addEventListener("click", closeMenu);

    const uidOffers = [
      { pack:"110 💎", price:4700 },
      { pack:"231 💎", price:9300 },
      { pack:"341 💎", price:13900 },
      { pack:"462 💎", price:18500 },
      { pack:"583 💎", price:23000 },
      { pack:"693 💎", price:27900 },
      { pack:"803 💎", price:32700 },
      { pack:"924 💎", price:37000 },
      { pack:"1188 💎", price:46000 },
      { pack:"2420 💎", price:92000 },
      { pack:"6160 💎", price:227500 }
    ];

    const accountOffers = [
      { pack:"Weekly", price:8000 },
      { pack:"Monthly", price:38000 }
    ];

    const notifications = [];
    const panelOverlay = document.getElementById("panelOverlay");
    const panels = document.querySelectorAll(".app-panel");
    const cartBadge = document.getElementById("cartBadge");
    const notificationBadge = document.getElementById("notificationBadge");
    const cartEmptyState = document.getElementById("cartEmptyState");
    const cartContent = document.getElementById("cartContent");
    const cartList = document.getElementById("cartList");
    const cartTotal = document.getElementById("cartTotal");
    const notificationsEmptyState = document.getElementById("notificationsEmptyState");
    const notificationsContent = document.getElementById("notificationsContent");
    const notificationList = document.getElementById("notificationList");
    const toast = document.getElementById("toast");

    function getCart(){
      try{
        return JSON.parse(localStorage.getItem("reloadPrimeCart") || "[]");
      }catch(e){
        return [];
      }
    }

    function saveCart(cart){
      localStorage.setItem("reloadPrimeCart", JSON.stringify(cart));
    }

    function formatAr(value){
      return new Intl.NumberFormat("fr-FR").format(value) + " Ar";
    }

    function updateBadge(badge,count){
      if(!badge) return;
      if(count > 0){
        badge.textContent = count > 99 ? "99+" : String(count);
        badge.classList.add("show");
      }else{
        badge.textContent = "0";
        badge.classList.remove("show");
      }
    }

    function openPanel(id){
      panels.forEach(panel=>{panel.classList.remove("show");panel.setAttribute("aria-hidden","true")});
      const panel = document.getElementById(id);
      if(panel){
        panel.classList.add("show");
        panel.setAttribute("aria-hidden","false");
        panelOverlay.classList.add("show");
      }
    }

    function closePanels(){
      panels.forEach(panel=>{panel.classList.remove("show");panel.setAttribute("aria-hidden","true")});
      panelOverlay.classList.remove("show");
    }

    function renderOffers(list, target, type){
      target.innerHTML = list.map((offer,index)=>`
        <article class="offer-card">
          <div class="diamonds">${offer.pack}</div>
          <div class="type">${type}</div>
          <div class="price">${formatAr(offer.price)}</div>
          <button class="add-btn" type="button" data-pack="${offer.pack}" data-price="${offer.price}" data-type="${type}">
            Ajouter
          </button>
        </article>
      `).join("");
    }

    function renderCart(){
      const cart = getCart();
      const count = cart.reduce((sum,item)=>sum + item.quantity, 0);
      updateBadge(cartBadge, count);

      if(cart.length === 0){
        cartEmptyState.hidden = false;
        cartContent.hidden = true;
        return;
      }

      cartEmptyState.hidden = true;
      cartContent.hidden = false;

      const groups = {};
      cart.forEach(item=>{
        if(!groups[item.game]) groups[item.game] = [];
        groups[item.game].push(item);
      });

      cartList.innerHTML = Object.entries(groups).map(([game,items])=>`
        <div>
          <div class="cart-game-title">${game}</div>
          ${items.map(item=>`
            <div class="cart-item">
              <div>
                <div class="cart-pack">${item.pack}</div>
                <div class="cart-price">${formatAr(item.price)}</div>
                <div class="qty-row">
                  <button class="qty-btn" type="button" data-minus="${item.id}">−</button>
                  <span class="qty-value">${item.quantity}</span>
                  <button class="qty-btn" type="button" data-plus="${item.id}">+</button>
                </div>
              </div>
              <button class="delete-cart-btn" type="button" data-delete="${item.id}" aria-label="Supprimer ce pack">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 7h16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M6 7l1 14h10l1-14"></path><path d="M9 7V4h6v3"></path>
                </svg>
              </button>
            </div>
          `).join("")}
        </div>
      `).join("");

      const total = cart.reduce((sum,item)=>sum + item.price * item.quantity, 0);
      cartTotal.textContent = formatAr(total);
    }

    function renderNotifications(){
      updateBadge(notificationBadge, notifications.length);
      if(notifications.length === 0){
        notificationsEmptyState.hidden = false;
        notificationsContent.hidden = true;
        return;
      }
      notificationsEmptyState.hidden = true;
      notificationsContent.hidden = false;
      notificationList.innerHTML = notifications.map(text=>`<div class="notification-item">${text}</div>`).join("");
    }

    function showToast(text){
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(()=>toast.classList.remove("show"), 1400);
    }

    renderOffers(uidOffers, document.getElementById("uidGrid"), "Par UID");
    renderOffers(accountOffers, document.getElementById("accountGrid"), "Abonnement");
    renderCart();
    renderNotifications();

    document.querySelectorAll("[data-panel]").forEach(btn=>{
      btn.addEventListener("click",()=>{
        openPanel(btn.dataset.panel);
        if(btn.closest(".side-menu")) closeMenu();
      });
    });

    document.querySelectorAll("[data-close-panel]").forEach(btn=>btn.addEventListener("click",closePanels));
    panelOverlay.addEventListener("click",closePanels);

    document.querySelectorAll(".tab-btn").forEach(btn=>{
      btn.addEventListener("click",()=>{
        document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        const tab = btn.dataset.tab;
        document.getElementById("uidOffers").hidden = tab !== "uid";
        document.getElementById("accountOffers").hidden = tab !== "account";
      });
    });

    document.addEventListener("click",(event)=>{
      const add = event.target.closest("[data-pack]");
      const minus = event.target.closest("[data-minus]");
      const plus = event.target.closest("[data-plus]");
      const del = event.target.closest("[data-delete]");

      if(add){
        const cart = getCart();
        const pack = add.dataset.pack;
        const price = Number(add.dataset.price);
        const type = add.dataset.type;
        const id = "freefire-" + type.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replaceAll(" ","-") + "-" + pack.toLowerCase().replaceAll(" ","-");
        const existing = cart.find(item=>item.id === id);

        if(existing){
          existing.quantity += 1;
        }else{
          cart.push({
            id,
            game:"Free Fire",
            type,
            pack,
            price,
            quantity:1
          });
        }

        saveCart(cart);
        renderCart();
        showToast("Ajouté au panier");
      }

      if(minus){
        const cart = getCart();
        const item = cart.find(i=>i.id === minus.dataset.minus);
        if(item){
          item.quantity = Math.max(1, item.quantity - 1);
          saveCart(cart);
          renderCart();
        }
      }

      if(plus){
        const cart = getCart();
        const item = cart.find(i=>i.id === plus.dataset.plus);
        if(item){
          item.quantity += 1;
          saveCart(cart);
          renderCart();
        }
      }

      if(del){
        const cart = getCart().filter(item=>item.id !== del.dataset.delete);
        saveCart(cart);
        renderCart();
      }
    });
  </script>
</body>
</html>
