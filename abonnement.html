<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FF Secure Shop - Abonnement</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* Cache le texte Hot */
    .pack-bonus{ display:none; }
  </style>
</head>
<body>
  <div class="container">
    <section class="topup-page">
      <div class="page-head-card">
        <div class="page-badge">Recharge officielle</div>
        <div class="page-head-content">
          <h1 class="page-title">Abonnement</h1>
        </div>
      </div>
      <section class="packs-section">
        <div class="packs-grid" id="topupGrid">
          <article class="pack-card pack-visual-weekly">
            <div class="pack-top">
              <div class="pack-image"><i class="fa-solid fa-calendar-week"></i></div>
            </div>
            <div class="pack-name">Weekly Membership</div>
            <div class="pack-price">9 650 Ar</div>
            <button class="pack-btn" type="button" data-name="Weekly Membership" data-price="9650">Ajouter</button>
          </article>
          <article class="pack-card pack-visual-monthly">
            <div class="pack-top">
              <div class="pack-image"><i class="fa-solid fa-calendar-days"></i></div>
            </div>
            <div class="pack-name">Monthly Membership</div>
            <div class="pack-price">47 500 Ar</div>
            <button class="pack-btn" type="button" data-name="Monthly Membership" data-price="47500">Ajouter</button>
          </article>
        </div>
      </section>
    </section>
  </div>
</body>
</html>
