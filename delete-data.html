<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suppression des données - FF Secure Shop</title>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
    }

    :root{
      --bg:linear-gradient(to bottom,#1fd4f3,#8a63ff);
      --card:rgba(255,255,255,0.12);
      --card-border:rgba(255,255,255,0.22);
      --text:#ffffff;
      --title:#ffffff;
      --paragraph:#eefcff;
      --email:#8ef9ff;
      --btn:#31d3e7;
      --btn-text:#000;
      --shadow:0 0 25px rgba(0,229,255,0.12), 0 0 45px rgba(140,82,255,0.10);
    }

    body.dark-theme{
      --bg:linear-gradient(to bottom,#0f172a,#111827,#1e293b);
      --card:rgba(255,255,255,0.05);
      --card-border:rgba(255,255,255,0.10);
      --text:#f8fafc;
      --title:#7ee7ff;
      --paragraph:#dbeafe;
      --email:#67e8f9;
      --btn:#2dd4bf;
      --btn-text:#001b22;
      --shadow:0 0 25px rgba(0,0,0,0.18), 0 0 40px rgba(45,212,191,0.08);
    }

    body{
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      padding:20px;
      display:flex;
      justify-content:center;
      align-items:center;
      transition:.25s ease;
    }

    .card{
      width:100%;
      max-width:850px;
      background:var(--card);
      border:2px solid var(--card-border);
      border-radius:28px;
      padding:28px 20px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    h1{
      font-size:30px;
      text-align:center;
      margin-bottom:18px;
      color:var(--title);
      text-shadow:0 0 10px rgba(255,255,255,0.18);
    }

    p{
      font-size:17px;
      line-height:1.8;
      color:var(--paragraph);
      margin-bottom:16px;
    }

    .email{
      display:inline-block;
      color:var(--email);
      font-weight:700;
      word-break:break-word;
    }

    .back{
      display:inline-block;
      margin-top:10px;
      text-decoration:none;
      color:var(--btn-text);
      background:var(--btn);
      padding:12px 18px;
      border-radius:14px;
      font-weight:700;
      border:2px solid rgba(255,255,255,0.45);
      box-shadow:0 0 16px rgba(0,229,255,0.18);
    }

    @media (max-width:700px){
      h1{font-size:24px;}
      p{font-size:15px;}
      .card{padding:22px 16px;}
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Suppression des données utilisateur</h1>

    <p>Si vous souhaitez demander la suppression de vos données, veuillez nous contacter à cette adresse :</p>

    <p class="email">rakotondrianakaijo@gmail.com</p>

    <p>Merci d’indiquer votre nom, votre adresse e-mail et votre demande de suppression.</p>

    <a class="back" href="index.html">Retour à l’accueil</a>
  </div>

  <script>
    function applyTheme(mode) {
      if (mode === "dark") {
        document.body.classList.add("dark-theme");
      } else if (mode === "light") {
        document.body.classList.remove("dark-theme");
      } else {
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.body.classList.toggle("dark-theme", prefersDark);
      }
    }

    const savedTheme = localStorage.getItem("ff_theme_mode") || "light";
    applyTheme(savedTheme);

    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
      if ((localStorage.getItem("ff_theme_mode") || "light") === "auto") {
        applyTheme("auto");
      }
    });
  </script>
</body>
</html>
