<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Reload Prime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:Arial,sans-serif;
      min-height:100vh;
      color:#fff;
      background:
        radial-gradient(circle at top left, rgba(0,255,255,0.12), transparent 24%),
        radial-gradient(circle at top right, rgba(0,102,255,0.14), transparent 28%),
        linear-gradient(180deg,#020814 0%, #03122b 45%, #020914 100%);
    }
    [hidden]{display:none!important}
    .brand-bar{
      min-height:64px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 16px;
      border-bottom:1px solid rgba(255,255,255,0.06);
      background:linear-gradient(90deg, rgba(0,255,255,0.07), rgba(0,98,255,0.03) 55%, rgba(0,0,0,0));
      position:sticky;
      top:0;
      z-index:10;
      backdrop-filter:none;
    }
    .brand-link{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;min-width:0}
    .brand-logo{width:34px;height:34px;object-fit:cover;border-radius:9px;box-shadow:0 0 12px rgba(39,220,255,0.18);background:#0b1220}
    .brand-name{font-family:'Orbitron',Arial,sans-serif;font-size:14px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;line-height:1;display:flex;gap:6px;white-space:nowrap}
    .reload{color:#fff}.prime{color:#42b8ff;text-shadow:0 0 10px rgba(66,184,255,.28)}
    .top-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
    .top-btn{
      min-height:38px;
      padding:0 12px;
      border:none;
      border-radius:13px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.10);
      color:#eef7ff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      box-shadow:0 8px 18px rgba(0,0,0,.20);
      text-decoration:none;
      font-size:13px;
      font-weight:900;
    }
    .container{max-width:920px;margin:0 auto;padding:16px 16px 34px}
    .hero,.card{
      border-radius:24px;
      padding:18px;
      margin-bottom:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.025)),linear-gradient(135deg, rgba(0,255,255,.07), rgba(0,98,255,.06));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 14px 34px rgba(0,0,0,.25);
    }
    .hero h1{font-size:26px;font-weight:900;margin-bottom:8px}
    .hero p{font-size:14px;color:rgba(255,255,255,.78);line-height:1.45}
    .card h2{font-size:20px;font-weight:900;margin-bottom:12px}
    .form-grid{display:grid;gap:12px}
    label{font-size:13px;font-weight:900;color:rgba(255,255,255,.78);margin-bottom:-4px}
    input,select,textarea{
      width:100%;
      min-height:50px;
      border:none;
      outline:none;
      border-radius:15px;
      padding:13px 14px;
      background:rgba(8,16,28,.88);
      border:1px solid rgba(255,255,255,.10);
      color:#fff;
      font-size:15px;
    }
    input::placeholder,textarea::placeholder{color:rgba(255,255,255,.42)}
    input:focus,select:focus,textarea:focus{
      border-color:#38bdf8;
      box-shadow:0 0 0 3px rgba(56,189,248,.13);
    }
    .btn{
      width:100%;
      min-height:50px;
      border:none;
      border-radius:15px;
      padding:13px 14px;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      margin-top:8px;
    }
    .btn-primary{
      color:#06111f;
      background:linear-gradient(90deg,#0f7cff,#33b5ff);
      box-shadow:0 10px 20px rgba(15,124,255,.28);
    }
    .btn-secondary{
      color:#fff;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.10);
    }
    .btn-danger{
      color:#fff;
      background:rgba(255,70,70,.14);
      border:1px solid rgba(255,70,70,.22);
    }
    .split{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .google-btn{
      display:flex;align-items:center;justify-content:center;gap:10px;
    }
    .message{
      border-radius:14px;
      padding:12px 13px;
      font-size:13px;
      line-height:1.4;
      background:rgba(0,229,255,.08);
      border:1px solid rgba(0,229,255,.18);
      color:#dffaff;
      margin-top:12px;
    }
    .message.error{
      background:rgba(255,70,70,.10);
      border-color:rgba(255,70,70,.24);
      color:#ffd9d9;
    }
    .admin-warning{
      background:rgba(255,184,0,.10);
      border-color:rgba(255,184,0,.26);
      color:#ffe8a3;
    }
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
    .stat{
      border-radius:18px;
      padding:14px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
    }
    .stat-value{font-size:24px;font-weight:900;color:#55d7ff}
    .stat-label{font-size:12px;color:rgba(255,255,255,.65);font-weight:900;text-transform:uppercase;letter-spacing:.8px;margin-top:4px}
    .toolbar{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:12px}
    .orders-list{display:grid;gap:12px}
    .order-card{
      border-radius:18px;
      padding:14px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      display:grid;
      gap:10px;
    }
    .order-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }
    .order-title{font-weight:900;font-size:16px}
    .order-date{font-size:12px;color:rgba(255,255,255,.58);margin-top:3px}
    .status{
      border-radius:999px;
      padding:6px 9px;
      font-size:11px;
      font-weight:900;
      white-space:nowrap;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.10);
      color:#fff;
    }
    .status.pending{background:rgba(255,184,0,.12);border-color:rgba(255,184,0,.28);color:#ffe6a3}
    .status.paid{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.26);color:#d9ffe7}
    .status.done{background:rgba(0,229,255,.10);border-color:rgba(0,229,255,.24);color:#dffaff}
    .status.cancelled{background:rgba(255,70,70,.10);border-color:rgba(255,70,70,.24);color:#ffd9d9}
    .details-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .detail{
      padding:10px;
      border-radius:14px;
      background:rgba(0,0,0,.16);
      border:1px solid rgba(255,255,255,.06);
      font-size:13px;
      color:rgba(255,255,255,.80);
      line-height:1.35;
    }
    .detail strong{display:block;color:#fff;font-size:12px;margin-bottom:4px}
    .items{display:grid;gap:6px}
    .item-line{
      display:flex;
      justify-content:space-between;
      gap:10px;
      padding:9px 10px;
      border-radius:12px;
      background:rgba(255,255,255,.035);
      border:1px solid rgba(255,255,255,.06);
      font-size:13px;
    }
    .order-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .empty-state{
      padding:18px 14px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      color:rgba(255,255,255,.80);
      text-align:center;
      font-size:14px;
      line-height:1.45;
    }
    @media(max-width:650px){
      .stats-grid{grid-template-columns:1fr 1fr}
      .toolbar{grid-template-columns:1fr}
      .details-grid{grid-template-columns:1fr}
      .split,.order-actions{grid-template-columns:1fr}
      .container{padding:14px}
      .hero h1{font-size:24px}
    }
  
    .top-icon-btn{
      position:relative;
      width:38px;
      height:38px;
      border:none;
      border-radius:13px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.10);
      color:#eef7ff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      box-shadow:0 8px 18px rgba(0,0,0,.20);
      text-decoration:none;
      -webkit-tap-highlight-color:transparent;
    }
    .top-icon-svg{
      width:20px;
      height:20px;
      display:block;
      stroke:currentColor;
      fill:none;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }
    .menu-overlay,.dialog-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      opacity:0;
      pointer-events:none;
      transition:opacity .22s ease;
    }
    .menu-overlay{z-index:40}
    .dialog-overlay{z-index:50}
    .menu-overlay.show,.dialog-overlay.show{
      opacity:1;
      pointer-events:auto;
    }
    .side-menu{
      position:fixed;
      top:0;
      right:0;
      width:min(86vw,330px);
      height:100vh;
      padding:18px 16px 22px;
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03)),linear-gradient(180deg,#071427 0%,#06111f 100%);
      border-left:1px solid rgba(255,255,255,.08);
      box-shadow:-20px 0 40px rgba(0,0,0,.35);
      transform:translateX(100%);
      transition:transform .25s ease;
      z-index:43;
      overflow-y:auto;
    }
    .side-menu.show{transform:translateX(0)}
    .side-menu-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:16px;
    }
    .side-menu-title{
      font-family:'Orbitron',Arial,sans-serif;
      font-size:18px;
      font-weight:800;
      letter-spacing:1px;
    }
    .side-menu-close{
      width:34px;
      height:34px;
      border:none;
      border-radius:12px;
      background:rgba(255,255,255,.06);
      color:#fff;
      font-size:22px;
      line-height:1;
      cursor:pointer;
    }
    .menu-list{display:grid;gap:10px}
    .menu-item{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      color:#fff;
      font-size:15px;
      font-weight:800;
      padding:14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
      cursor:pointer;
      text-decoration:none;
      -webkit-tap-highlight-color:transparent;
    }
    .menu-item-main{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }
    .menu-icon{
      width:22px;
      height:22px;
      flex:0 0 22px;
      display:block;
      opacity:.92;
      stroke:currentColor;
      fill:none;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }
    .menu-text{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .admin-account-card{
      margin-top:10px;
      padding:13px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      color:rgba(255,255,255,.82);
      font-size:13px;
      line-height:1.4;
      display:none;
    }
    .admin-account-card.show{display:block}
    .admin-account-card strong{display:block;color:#fff;font-size:14px;margin-bottom:4px}

    .confirm-dialog{
      position:fixed;
      left:16px;
      right:16px;
      top:50%;
      transform:translateY(-50%) scale(.96);
      max-width:390px;
      margin:auto;
      z-index:51;
      opacity:0;
      pointer-events:none;
      transition:.22s ease;
      border-radius:22px;
      padding:16px;
      background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.035)),linear-gradient(135deg,rgba(0,255,255,.06),rgba(0,98,255,.08));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 18px 40px rgba(0,0,0,.35);
      backdrop-filter:none;
    }
    .confirm-dialog.show{
      opacity:1;
      pointer-events:auto;
      transform:translateY(-50%) scale(1);
    }
    .confirm-dialog h3{
      font-size:20px;
      font-weight:900;
      margin-bottom:8px;
    }
    .confirm-dialog p{
      color:rgba(255,255,255,.82);
      font-size:14px;
      line-height:1.45;
      margin-bottom:14px;
    }
    .confirm-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .confirm-actions .btn{margin-top:0}

    .custom-select{
      position:relative;
      width:100%;
    }
    .custom-select-btn{
      width:100%;
      min-height:50px;
      border:none;
      outline:none;
      border-radius:15px;
      padding:13px 44px 13px 14px;
      background:rgba(8,16,28,.88);
      border:1px solid rgba(255,255,255,.10);
      color:#fff;
      font-size:15px;
      text-align:left;
      cursor:pointer;
      font-weight:800;
    }
    .custom-select-btn::after{
      content:"";
      position:absolute;
      right:18px;
      top:50%;
      width:9px;
      height:9px;
      border-right:2px solid rgba(255,255,255,.8);
      border-bottom:2px solid rgba(255,255,255,.8);
      transform:translateY(-65%) rotate(45deg);
      pointer-events:none;
    }
    .custom-select-menu{
      position:absolute;
      left:0;
      right:0;
      top:calc(100% + 8px);
      z-index:20;
      display:none;
      gap:6px;
      padding:8px;
      border-radius:18px;
      background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.04)),#071427;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 16px 34px rgba(0,0,0,.34);
    }
    .custom-select.open .custom-select-menu{
      display:grid;
    }
    .custom-select-option{
      width:100%;
      border:none;
      border-radius:13px;
      padding:12px 14px;
      background:transparent;
      color:#fff;
      text-align:left;
      font-size:14px;
      font-weight:850;
      cursor:pointer;
    }
    .custom-select-option.active,
    .custom-select-option:hover{
      background:rgba(0,229,255,.10);
      color:#dffaff;
    }

  
    .status-options{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    .status-option-btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:11px 10px;
      background:rgba(255,255,255,.055);
      border:1px solid rgba(255,255,255,.10);
      color:#fff;
      font-size:13px;
      font-weight:900;
      cursor:pointer;
      text-align:center;
    }
    .status-option-btn.active{
      background:linear-gradient(90deg,#0f7cff,#33b5ff);
      color:#06111f;
      border-color:rgba(0,229,255,.35);
      box-shadow:0 8px 18px rgba(15,124,255,.18);
    }
    .status-option-btn.cancel-active{
      background:rgba(255,70,70,.16);
      color:#ffd9d9;
      border-color:rgba(255,70,70,.28);
    }

  
/* Oeil mot de passe */
.password-wrap{position:relative;width:100%}
.password-wrap input{padding-right:52px!important}
.eye-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  width:34px;height:34px;border:none;border-radius:11px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.eye-btn svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.eye-btn .eye-off{display:none}
.eye-btn.showing .eye{display:none}
.eye-btn.showing .eye-off{display:block}

/* Anti-flou propre */
body{-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision}
.brand-bar,.admin-panel,.app-panel,.side-menu,.card,.panel-card{
  backdrop-filter:none!important;
  -webkit-backdrop-filter:none!important;
}
.hero,.ff-hero,.game-card,.offer-card,.panel-card,.admin-card,.stat-card,.order-card{
  filter:none!important;
  backdrop-filter:none!important;
  -webkit-backdrop-filter:none!important;
}
img,.brand-logo,.logo{filter:none!important;image-rendering:auto!important}
.hero img,.ff-banner-img{opacity:1!important;filter:none!important}
.brand-bar{
  background:#061225!important;
  background-image:linear-gradient(90deg,#071b2b,#061225 55%,#051022)!important;
}


/* Panneaux opaques : plus de transparence */
.side-menu,
.app-panel,
.panel-card,
.menu-item,
.submenu a,
.offer-card,
.game-card,
.hero,
.ff-hero,
.admin-card,
.stat-card,
.order-card,
.cart-item,
.history-card,
.empty-state{
  background-color:#071427 !important;
  background-image:linear-gradient(135deg,#0a1a2d,#071427) !important;
  backdrop-filter:none !important;
  -webkit-backdrop-filter:none !important;
}

.panel-overlay,
.menu-overlay{
  background:rgba(0,0,0,.60) !important;
}

.brand-bar{
  background:#061225 !important;
  background-image:linear-gradient(90deg,#071b2b,#061225 55%,#051022) !important;
}

.auth-form input,
input,
textarea,
select{
  background:#06111f !important;
  border-color:rgba(255,255,255,.12) !important;
}

.primary-btn,
.add-btn,
.tab-btn.active{
  background-image:linear-gradient(90deg,#0f7cff,#33b5ff) !important;
}

.secondary-btn,
.tab-btn,
.icon-btn,
.close-btn,
.qty-btn,
.delete-btn{
  background:#101d33 !important;
  border-color:rgba(255,255,255,.12) !important;
}


/* Oeil mot de passe visible */
.password-eye-box{
  position:relative !important;
  width:100% !important;
}
.password-eye-box input{
  width:100% !important;
  padding-right:54px !important;
}
.password-eye-btn{
  position:absolute !important;
  right:12px !important;
  top:50% !important;
  transform:translateY(-50%) !important;
  width:36px !important;
  height:36px !important;
  border:none !important;
  border-radius:12px !important;
  background:#101d33 !important;
  border:1px solid rgba(255,255,255,.16) !important;
  color:#ffffff !important;
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  z-index:5 !important;
  cursor:pointer !important;
}
.password-eye-btn svg{
  width:20px !important;
  height:20px !important;
  stroke:currentColor !important;
  fill:none !important;
  stroke-width:2 !important;
  stroke-linecap:round !important;
  stroke-linejoin:round !important;
}
.password-eye-btn .eye-hide-icon{
  display:none !important;
}
.password-eye-btn.showing .eye-show-icon{
  display:none !important;
}
.password-eye-btn.showing .eye-hide-icon{
  display:block !important;
}


/* Référence paiement bien visible */
.reference-line,
.admin-ref-line{
  display:block;
  margin-top:6px;
  color:#55d7ff !important;
  font-weight:900 !important;
}
.reference-line b,
.admin-ref-line b{
  color:#ffffff !important;
}


/* Bouton copier UID / ID */
.copy-uid-btn{
  margin-top:8px;
  width:100%;
  border:none;
  border-radius:14px;
  padding:10px 12px;
  background:linear-gradient(90deg,#0f7cff,#33b5ff);
  color:#06111f;
  font-weight:900;
  cursor:pointer;
}
.uid-copy-ready{
  border-color:rgba(85,215,255,.25) !important;
}


/* Bouton supprimer commande */
.delete-order-btn{
  margin-top:10px;
  width:100%;
  border:none;
  border-radius:14px;
  padding:11px 12px;
  background:linear-gradient(90deg,#ff4d4d,#ff7777);
  color:#fff;
  font-weight:900;
  cursor:pointer;
}
.delete-order-btn.confirming{
  background:linear-gradient(90deg,#ff9500,#ffb84d);
  color:#06111f;
}


/* Supprimer commande visible */
.delete-order-btn,
.delete-order-top-btn{
  margin-top:10px;
  width:100%;
  border:none;
  border-radius:14px;
  padding:12px 14px;
  background:linear-gradient(90deg,#ff3b3b,#ff6b6b) !important;
  color:#fff !important;
  font-weight:900;
  cursor:pointer;
  display:block !important;
}
.delete-order-btn.confirming,
.delete-order-top-btn.confirming{
  background:linear-gradient(90deg,#ff9500,#ffbd59) !important;
  color:#06111f !important;
}


/* Bouton supprimer commande visible en haut */
.rp-delete-order-btn{
  width:100%;
  margin:10px 0 12px;
  border:none;
  border-radius:14px;
  padding:12px 14px;
  background:linear-gradient(90deg,#ff3b3b,#ff6b6b) !important;
  color:#fff !important;
  font-weight:900;
  cursor:pointer;
  display:block !important;
  text-align:center;
}
.rp-delete-order-btn.confirm{
  background:linear-gradient(90deg,#ff9500,#ffbd59) !important;
  color:#06111f !important;
}

</style>

        return "Date inconnue";
      }catch(e){

    function getGameInfoText(gameInfo){
      if(!gameInfo || typeof gameInfo !== "object") return { ids:"-", pseudos:"-" };

      const uidParts = [];
      const pseudoParts = [];

      Object.entries(gameInfo).forEach(([game, info]) => {
        if(info && typeof info === "object"){
          const idValue = info.id || info.uid || info.playerId || "";
          const pseudoValue = info.pseudo || info.nickname || "";
          if(idValue) uidParts.push(`${game} : ${idValue}`);
          if(pseudoValue) pseudoParts.push(`${game} : ${pseudoValue}`);
        }
      });

      return {
        ids: uidParts.length ? uidParts.join("<br>") : "-",
        pseudos: pseudoParts.length ? pseudoParts.join("<br>") : "-"
      };
    }

    function getStatusLabel(status){
      const labels = {
        pending:"En attente",
        paid:"Payé",
        processing:"En traitement",
        done:"Terminé",
        cancelled:"Annulé"
      };
      return labels[status] || "En attente";
    }

    function getStatusClass(status){
      if(status === "paid") return "paid";
      if(status === "done") return "done";
      if(status === "cancelled") return "cancelled";
      return "pending";
    }

    function updateStats(){
      statTotal.textContent = allOrders.length;
      statPending.textContent = allOrders.filter(o => (o.status || "pending") === "pending").length;
      statPaid.textContent = allOrders.filter(o => (o.status || "pending") === "paid").length;
      statDone.textContent = allOrders.filter(o => (o.status || "pending") === "done").length;
    }

    function renderOrders(){
      updateStats();

      const filter = currentStatusFilter;
      const orders = filter === "all" ? allOrders : allOrders.filter(o => (o.status || "pending") === filter);

      emptyOrders.hidden = orders.length > 0;
      ordersList.innerHTML = orders.map(order => {
        const items = Array.isArray(order.items) ? order.items : [];
        const status = order.status || "pending";

        const gameInfo = order.gameInfo || {};

              <div class="detail"><strong>UID / ID</strong>${formattedGameInfo.ids || order.uid || "-"}</div>
              <div class="detail"><strong>Pseudo</strong>${formattedGameInfo.pseudos || order.pseudo || "-"}</div>
            </div>

            <div class="items">
              ${items.length ? items.map(item => `
                <div class="item-line">
                  <span>${item.game || "Jeu"} — ${item.pack || "Pack"} × ${item.quantity || 1}</span>
                  <strong>${formatAr((item.price || 0) * (item.quantity || 1))}</strong>
                </div>
              `).join("") : `<div class="item-line"><span>Aucun détail d'article</span><strong>-</strong></div>`}
            </div>

            <div class="status-options" data-status-options="${order.id}">
              <button class="status-option-btn ${status === "pending" ? "active" : ""}" type="button" data-set-status="${order.id}" data-value="pending">En attente</button>
              <button class="status-option-btn ${status === "paid" ? "active" : ""}" type="button" data-set-status="${order.id}" data-value="paid">Payé</button>
              <button class="status-option-btn ${status === "processing" ? "active" : ""}" type="button" data-set-status="${order.id}" data-value="processing">En traitement</button>
              <button class="status-option-btn ${status === "done" ? "active" : ""}" type="button" data-set-status="${order.id}" data-value="done">Terminé</button>
              <button class="status-option-btn ${status === "cancelled" ? "active cancel-active" : ""}" type="button" data-set-status="${order.id}" data-value="cancelled">Annulé</button>
            </div>
          </article>

      }).join("");
    }

    function loadLocalOrders(){
      try{
        const history = JSON.parse(localStorage.getItem("reloadPrimeHistory") || "[]");
        return history.map((order, index) => ({
          id:"local-" + index,
          ...order,
          status: order.status || "pending"
        }));
      }catch(e){
        return [];
      }
    }

    function listenOrders(){
      if(unsubscribeOrders) unsubscribeOrders();

      try{
        const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
        unsubscribeOrders = onSnapshot(q, (snapshot) => {
          allOrders = snapshot.docs.map(docSnap => ({
            id: docSnap.id,
            ...docSnap.data()
          }));
          const localOrders = loadLocalOrders();
          allOrders = [...allOrders, ...localOrders];
          renderOrders();
        }, (error) => {
          allOrders = loadLocalOrders();
          renderOrders();
          console.warn("Firestore non disponible, affichage localStorage uniquement.", error);
        });
      }catch(error){
        allOrders = loadLocalOrders();
        renderOrders();
      }
    }

    async function updateOrderStatus(id, status){
      if(id.startsWith("local-")){
        const index = Number(id.replace("local-",""));
        const history = JSON.parse(localStorage.getItem("reloadPrimeHistory") || "[]");
        if(history[index]){
          history[index].status = status;
          localStorage.setItem("reloadPrimeHistory", JSON.stringify(history));
          allOrders = loadLocalOrders();
          renderOrders();
        }
        return;

      await updateDoc(doc(db, "orders", id), {
        status,
        updatedAt: serverTimestamp()

    async function logout(){

    function openMenu(){

    openMenuBtn.addEventListener("click", openMenu);
    closeMenuBtn.addEventListener("click", closeMenu);

      adminAccountCard.classList.toggle("show");

    dialogOverlay.addEventListener("click", closeLogoutDialog);
    confirmLogoutBtn.addEventListener("click", async ()=>{
      closeLogoutDialog();
      await logout();
    });

    refreshBtn.addEventListener("click", renderOrders);

    document.addEventListener("click", async (event)=>{
      const statusBtn = event.target.closest("[data-set-status]");

      const id = statusBtn.dataset.setStatus;

      if(!user){

<script>
(function(){
  function fixPaymentReference(){
    const blocks = Array.from(document.querySelectorAll("div, section, article"));
    blocks.forEach(block=>{
      const txt = (block.textContent || "").trim();
      if(!/Paiement/i.test(txt)) return;
      if(/Référence\s*:/i.test(txt) || /Réf\s*:/i.test(txt)) return;

      const children = Array.from(block.children);
      for(let i=0;i<children.length;i++){
        const childText = (children[i].textContent || "").trim();

        // Cherche un bloc qui contient la méthode + une ligne référence
        if(/^(Orange Money|Mvola)$/i.test(childText) && children[i+1]){
          const ref = (children[i+1].textContent || "").trim();
          if(/^[A-Za-z0-9._-]{3,}$/.test(ref)){
            children[i+1].innerHTML = '<span class="reference-line"><b>Référence :</b> ' + ref + '</span>';
          }
        }

        // Cas où "Orange Money 123456" est dans le même bloc
        if(/^(Orange Money|Mvola)\s+[A-Za-z0-9._-]{3,}$/i.test(childText)){
          const m = childText.match(/^(Orange Money|Mvola)\s+(.+)$/i);
          if(m){
            children[i].innerHTML = m[1] + '<span class="reference-line"><b>Référence :</b> ' + m[2] + '</span>';
          }
        }
      }

      // Cas texte brut avec saut de ligne dans le même élément
      const all = (block.textContent || "").trim();
      const m = all.match(/Paiement\s*(Orange Money|Mvola)\s*([A-Za-z0-9._-]{3,})/i);
      if(m && !/Référence\s*:/i.test(all)){
        const walker = document.createTreeWalker(block, NodeFilter.SHOW_TEXT);
        let node;
        while((node = walker.nextNode())){
          const t = node.nodeValue;
          if(t && t.trim() === m[2]){
            const span = document.createElement("span");
            span.className = "reference-line";
            span.innerHTML = "<b>Référence :</b> " + m[2];
            node.parentNode.replaceChild(span, node);
            break;
          }
        }
      }
    });
  }

  fixPaymentReference();
  setInterval(fixPaymentReference, 800);
})();
</script>


<script>
(function(){
  function addCopyUidButtons(){
    const cards = document.querySelectorAll(".order-card, .admin-order, article, .panel-card, .order-item");

    cards.forEach(card=>{
      if(card.querySelector(".copy-uid-btn")) return;

      const text = card.textContent || "";
      if(!/UID|IUD|ID/i.test(text)) return;

      let uid = "";

      const match = text.match(/(?:UID|IUD|ID)\s*\/?\s*(?:Free Fire|PUBG|Mobile)?\s*:?\s*([0-9]{5,20})/i);
      if(match && match[1]) uid = match[1];

      if(!uid){
        const numberMatch = text.match(/\b[0-9]{8,15}\b/);
        if(numberMatch) uid = numberMatch[0];
      }

      if(!uid) return;

      card.classList.add("uid-copy-ready");

      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "copy-uid-btn";
      btn.textContent = "Copier UID : " + uid;
      btn.addEventListener("click", async ()=>{
        try{
          await navigator.clipboard.writeText(uid);
          btn.textContent = "UID copié ✓";
        }catch(e){
          const temp = document.createElement("input");
          temp.value = uid;
          document.body.appendChild(temp);
          temp.select();
          document.execCommand("copy");
          temp.remove();
          btn.textContent = "UID copié ✓";
        }
        setTimeout(()=>{ btn.textContent = "Copier UID : " + uid; }, 900);
      });

      const uidBlocks = Array.from(card.querySelectorAll("div, p, span")).filter(el=>/UID|IUD|ID/i.test(el.textContent || ""));
      if(uidBlocks.length){
        uidBlocks[uidBlocks.length - 1].appendChild(btn);
      }else{
        card.appendChild(btn);
      }
    });
  }

  addCopyUidButtons();
  setInterval(addCopyUidButtons, 900);
})();
</script>


<script>
(function(){
  function looksLikeOrder(card){
    const t = (card.textContent || "").replace(/\s+/g," ").trim();
    return t.includes("Téléphone") && t.includes("Paiement") && (t.includes("UID") || t.includes("IUD") || t.includes("ID")) && t.includes("Pseudo");
  }

  function findOrderCards(){
    const all = Array.from(document.querySelectorAll("div, article, section"));
    return all.filter(el=>{
      if(!looksLikeOrder(el)) return false;

      // On garde la plus petite carte qui contient une commande complète
      const childOrder = Array.from(el.children || []).some(child => looksLikeOrder(child));
      return !childOrder;
    });
  }

  function getDocId(card){
    // Essayer de récupérer un id Firebase si le code l'a mis dans data-*
    let el = card;
    while(el){
      if(el.dataset){
        const id = el.dataset.id || el.dataset.orderId || el.dataset.docId;
        if(id) return id;
      }
      el = el.parentElement;
    }
    return "";
  }

  function addButtons(){
    findOrderCards().forEach(card=>{
      if(card.querySelector(".rp-delete-order-btn")) return;

      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "rp-delete-order-btn";
      btn.textContent = "Supprimer la commande";

      let confirm = false;
      btn.addEventListener("click", async ()=>{
        if(!confirm){
          confirm = true;
          btn.classList.add("confirm");
          btn.textContent = "Confirmer suppression ?";
          setTimeout(()=>{
            confirm = false;
            btn.classList.remove("confirm");
            btn.textContent = "Supprimer la commande";
          }, 2500);
          return;
        }

        btn.disabled = true;
        btn.textContent = "Suppression...";

        const id = getDocId(card);
        try{
          const deleted = JSON.parse(localStorage.getItem("reloadPrimeDeletedOrders") || "[]");
          deleted.push({ id, text:(card.textContent || "").slice(0,150), date:new Date().toISOString() });
          localStorage.setItem("reloadPrimeDeletedOrders", JSON.stringify(deleted));
        }catch(e){}

        card.remove();
      });

      // placer juste après la ligne titre/date/statut
      const firstBox = Array.from(card.children).find(child=>{
        const txt = (child.textContent || "").trim();
        return /kaijo|Ar|En attente|Payé|Terminé|Annulé|En traitement/i.test(txt);
      });

      if(firstBox){
        firstBox.insertAdjacentElement("afterend", btn);
      }else{
        card.insertBefore(btn, card.firstChild);
      }
    });
  }

  addButtons();
  setInterval(addButtons, 500);
})();
</script>
