<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FF Secure Shop - Accueil</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<style>
/* ===================== RESET & VARIABLES ===================== */
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;}
:root{
  --bg:linear-gradient(to bottom,#1fd4f3,#8a63ff);
  --card:rgba(255,255,255,0.12);
  --card-border:rgba(255,255,255,0.18);
  --panel:#f8fafc;
  --panel-text:#111827;
  --topbar:linear-gradient(to right,#9465ff,#2bbef3);
  --btn:#31d3e7;
  --btn-text:#000;
  --icon-bg:rgba(255,255,255,0.12);
  --icon-border:rgba(255,255,255,0.22);
  --text:#fff;
  --soft:#eefcff;
  --muted:#64748b;
  --danger:#ff2f6d;
  --shadow-neon:0 0 16px rgba(20,231,255,0.22),0 0 30px rgba(139,92,246,0.18);
}
body.dark-theme{
  --bg:linear-gradient(to bottom,#071428,#0f172a,#111827);
  --card:rgba(255,255,255,0.05);
  --card-border:rgba(255,255,255,0.08);
  --panel:#0b1730;
  --panel-text:#f8fafc;
  --topbar:linear-gradient(to right,#334155,#0f172a);
  --btn:#2dd4bf;
  --btn-text:#001b22;
  --icon-bg:rgba(255,255,255,0.08);
  --icon-border:rgba(255,255,255,0.14);
  --text:#f8fafc;
  --soft:#dbeafe;
  --muted:#cbd5e1;
  --shadow-neon:0 0 18px rgba(34,211,238,0.16),0 0 34px rgba(139,92,246,0.12);
}

/* ===================== BODY ===================== */
html,body{width:100%;overflow-x:hidden;background:var(--bg);color:var(--text);min-height:100vh;padding:12px;transition:.25s ease;}
body.modal-open{overflow:hidden;}

/* ===================== TOPBAR ===================== */
.topbar-wrap{position:fixed;top:10px;left:10px;right:10px;z-index:300;}
.topbar-shell{max-width:980px;margin:0 auto;}
.topbar{width:100%;display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 10px;border-radius:22px;background:var(--topbar);border:2px solid rgba(255,255,255,0.2);box-shadow:0 10px 24px rgba(0,0,0,0.15);position:relative;z-index:301;}
.left-zone,.right-zone{display:flex;align-items:center;gap:6px;min-width:0;}
.icon-btn{width:42px;height:42px;border:none;border-radius:14px;background:var(--icon-bg);border:2px solid var(--icon-border);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;flex-shrink:0;position:relative;transition:.18s ease;}
.icon-btn:active{transform:scale(.96);}
.cart-badge{position:absolute;top:-7px;right:-7px;min-width:22px;height:22px;border-radius:50%;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;background:var(--danger);}
#panelBackdrop{position:fixed;left:0;right:0;top:78px;bottom:0;display:none;background:rgba(0,0,0,0.24);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:200;}
#panelBackdrop.show{display:block;}

/* ===================== MODAL PANELS ===================== */
.fixed-dropdown{display:none;position:fixed;top:78px;left:10px;right:10px;z-index:260;}
.fixed-dropdown.show{display:block;animation:fadeIn .18s ease;}
.fixed-dropdown-inner{width:100%;max-width:980px;margin:0 auto;background:var(--panel);color:var(--panel-text);border-radius:22px;padding:16px;box-shadow:0 10px 24px rgba(0,0,0,0.18);border:1px solid rgba(255,255,255,0.12);}
.center-modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:18px;z-index:250;}
.center-modal.show{display:flex;animation:fadeIn .18s ease;}
.modal-card{width:min(100%,540px);max-height:85vh;overflow:auto;background:var(--panel);color:var(--panel-text);border-radius:24px;padding:18px;box-shadow:0 20px 50px rgba(0,0,0,0.32);border:1px solid rgba(255,255,255,0.12);}
.modal-card.wide{width:min(100%,720px);}

/* ===================== HERO ===================== */
.container{max-width:980px;margin:0 auto;padding-top:100px;position:relative;z-index:1;}
.hero{width:100%;background:var(--card);border:2px solid var(--card-border);border-radius:34px;padding:30px 18px 28px;box-shadow:0 12px 28px rgba(0,0,0,0.12);}
.hero-title{font-size:32px;text-align:center;color:var(--text);margin-bottom:18px;text-shadow:1px 3px 7px rgba(0,0,0,0.16);}
.subtitle{text-align:center;font-size:18px;line-height:1.8;color:var(--soft);margin-bottom:20px;}
.btn-group{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:12px;}
.main-btn{padding:16px 18px;background:var(--btn);color:var(--btn-text);border-radius:22px;font-weight:700;text-decoration:none;text-align:center;flex:1;min-width:160px;box-shadow:0 0 16px rgba(20,231,255,0.22);}

/* ===================== PANIER FLOTTANT ===================== */
#floatingCart{position:fixed;bottom:18px;right:18px;z-index:400;background:var(--card);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:24px;padding:14px;box-shadow:0 10px 28px rgba(0,0,0,0.28);width:240px;cursor:move;display:none;}
#floatingCart h3{font-size:18px;margin-bottom:12px;color:var(--text);}
#floatingCart ul{list-style:none;margin-bottom:12px;}
#floatingCart li{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:14px;}
#floatingCart button{border:none;border-radius:10px;padding:6px 8px;font-weight:700;cursor:pointer;background:linear-gradient(to right,#ff4d6d,#ff7b00);color:#fff;}

/* ===================== KEYFRAMES ===================== */
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="topbar-wrap">
  <div class="topbar-shell">
    <div class="topbar">
      <div class="left-zone">
        <button class="icon-btn" id="menuBtn"><i class="fa-solid fa-bars"></i></button>
      </div>
      <div class="right-zone">
        <button class="icon-btn" id="cartBtn"><i class="fa-solid fa-cart-shopping"></i><span class="cart-badge" id="cartCount">0</span></button>
      </div>
    </div>
  </div>
</div>

<div id="panelBackdrop"></div>

<div class="fixed-dropdown" id="menuPanel">
  <div class="fixed-dropdown-inner">
    <div class="panel-head"><h2>Menu</h2><button class="close-btn" data-close-panel="menu">&times;</button></div>
    <div class="menu-grid">
      <a class="menu-link" href="topup.html">Top Up</a>
      <a class="menu-link" href="abonnement.html">Abonnement</a>
    </div>
  </div>
</div>

<div class="container">
  <div class="hero">
    <h1 class="hero-title">Bienvenue sur FF Secure Shop</h1>
    <p class="subtitle">Rechargez vos diamants rapidement et en toute sécurité.</p>
    <div class="btn-group">
      <a href="topup.html" class="main-btn">Top Up</a>
      <a href="abonnement.html" class="main-btn">Abonnement</a>
    </div>
  </div>
</div>

<!-- PANIER FLOTTANT -->
<div id="floatingCart">
  <h3>Panier</h3>
  <ul id="floatingCartList"></ul>
  <div>Total : <span id="floatingCartTotal">0 Ar</span></div>
  <button id="checkoutBtn">Commander</button>
</div>

<script>
// ===================== PANIER FLOTTANT LOGIC =====================
let floatingCart = document.getElementById("floatingCart");
let cartListEl = document.getElementById("floatingCartList");
let cartTotalEl = document.getElementById("floatingCartTotal");

function getCart(){return JSON.parse(localStorage.getItem("ff_cart")||"[]");}
function saveCart(cart){localStorage.setItem("ff_cart",JSON.stringify(cart));}
function formatAr(v){return Number(v).toLocaleString("fr-FR")+" Ar";}

function renderFloatingCart(){
  const cart = getCart();
  if(cart.length===0){floatingCart.style.display="none";return;}
  floatingCart.style.display="block";
  cartListEl.innerHTML="";
  let total=0;
  cart.forEach((item,i)=>{
    total+=item.price*(item.qty||1);
    const li=document.createElement("li");
    li.innerHTML=`<span>${item.name} x${item.qty||1}</span><button data-index="${i}">X</button>`;
    cartListEl.appendChild(li);
  });
  cartTotalEl.textContent=formatAr(total);
}
cartListEl.addEventListener("click",(e)=>{
  const btn=e.target.closest("button");
  if(!btn)return;
  const index=Number(btn.dataset.index);
  let cart=getCart();
  cart.splice(index,1);
  saveCart(cart);
  renderFloatingCart();
});
document.getElementById("checkoutBtn").addEventListener("click",()=>{
  window.location.href="topup.html";
});
renderFloatingCart();

// DRAG FLOATING CART
let isDragging=false,offsetX=0,offsetY=0;
floatingCart.addEventListener("mousedown",e=>{
  isDragging=true;offsetX=e.offsetX;offsetY=e.offsetY;
});
document.addEventListener("mouseup",()=>{isDragging=false;});
document.addEventListener("mousemove",e=>{
  if(!isDragging)return;
  floatingCart.style.top=(e.clientY-offsetY)+"px";
  floatingCart.style.left=(e.clientX-offsetX)+"px";
});
</script>
</body>
                              </html>
