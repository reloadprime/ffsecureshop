<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Secure Shop</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #5bc0f8, #8c5ef8);
    transition: background 0.3s, color 0.3s;
  }
  .navbar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    background: linear-gradient(90deg, #8c5ef8, #5bc0f8);
    padding: 10px;
    border-radius: 20px;
    margin: 10px;
  }
  .navbar button {
    background: none;
    border: none;
    font-size: 24px;
    margin-left: 10px;
    cursor: pointer;
  }
  .navbar button:hover {
    opacity: 0.7;
  }
  .container {
    text-align: center;
    padding: 20px;
    color: black;
  }
  .info-box {
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
    padding: 10px;
    display: inline-block;
    margin: 10px 0;
  }
  .btn {
    display: inline-block;
    background: #0ff;
    border: none;
    padding: 15px 30px;
    margin: 10px;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
  }
  /* Panneaux flottants */
  .panel {
    display: none;
    position: fixed;
    top: 70px;
    right: 10px;
    width: 300px;
    max-height: 400px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    padding: 20px;
    overflow-y: auto;
    z-index: 100;
  }
  .panel h3 {
    margin-top: 0;
  }
  /* Mode sombre */
  body.dark {
    background: #222;
    color: #eee;
  }
  body.dark .container, body.dark .info-box {
    color: #eee;
  }
  body.dark .panel {
    background: #333;
    color: #eee;
  }
</style>
</head>
<body>
<div class="navbar">
  <button id="toggle-dark">&#9790;</button>
  <button id="open-history">&#128339;</button>
  <button id="open-account">&#128100;</button>
  <button id="open-cart">&#128722;<span id="cart-count">0</span></button>
</div>

<div class="container">
  <h1>Bienvenue sur FF Secure Shop 💎</h1>
  <div class="info-box">
    heure d’ouverture • 💎 Top Up instantané • 🔥 Abonnements disponibles
  </div>
  <div>
    <button class="btn" id="topup-btn">Top Up</button>
    <button class="btn" id="sub-btn">Abonnement</button>
  </div>
  <div class="info-box">
    Paiement : Orange Money • Mvola
  </div>
</div>

<!-- Panneaux flottants -->
<div class="panel" id="cart-panel">
  <h3>Panier</h3>
  <p>Le panier est vide pour le moment.</p>
</div>

<div class="panel" id="account-panel">
  <h3>Compte</h3>
  <p>Connexion / Inscription ici.</p>
</div>

<div class="panel" id="history-panel">
  <h3>Historique</h3>
  <p>Aucun historique pour le moment.</p>
</div>

<script>
  const darkBtn = document.getElementById('toggle-dark');
  const cartBtn = document.getElementById('open-cart');
  const accountBtn = document.getElementById('open-account');
  const historyBtn = document.getElementById('open-history');

  const cartPanel = document.getElementById('cart-panel');
  const accountPanel = document.getElementById('account-panel');
  const historyPanel = document.getElementById('history-panel');

  darkBtn.addEventListener('click', () => {
    document.body.classList.toggle('dark');
  });

  cartBtn.addEventListener('click', () => {
    cartPanel.style.display = cartPanel.style.display === 'block' ? 'none' : 'block';
    accountPanel.style.display = 'none';
    historyPanel.style.display = 'none';
  });
  accountBtn.addEventListener('click', () => {
    accountPanel.style.display = accountPanel.style.display === 'block' ? 'none' : 'block';
    cartPanel.style.display = 'none';
    historyPanel.style.display = 'none';
  });
  historyBtn.addEventListener('click', () => {
    historyPanel.style.display = historyPanel.style.display === 'block' ? 'none' : 'block';
    cartPanel.style.display = 'none';
    accountPanel.style.display = 'none';
  });
</script>
</body>
</html>
