
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commander vos diamants 💎</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body {
      background: linear-gradient(to bottom, #00d9ff, #8b5cf6);
      min-height: 100vh;
      padding: 20px;
    }

    .commande-card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.18);
      overflow: hidden;
    }

    .title {
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #555;
      margin-bottom: 20px;
    }

    .pack-box {
      display: none;
      background: #eaf7ff;
      border: 1px solid #bfe8ff;
      color: #0b5f84;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 18px;
      font-weight: 600;
    }

    .btn-submit {
      min-width: 180px;
    }
  </style>
</head>
<body>
  <div class="container my-4" style="max-width: 760px;">
    <div class="commande-card p-4">
      <h3 class="title">Commander vos diamants 💎</h3>
      <p class="subtitle">Remplissez les informations pour finaliser votre commande.</p>

      <div class="pack-box" id="pack_box">
        Pack choisi : <span id="pack_display"></span>
      </div>

      <form
        action="https://usebasin.com/f/1574fccfda5e"
        method="POST"
        enctype="multipart/form-data"
        class="needs-validation"
        novalidate
      >
        <input type="hidden" id="pack_hidden" name="Pack_choisi" />

        <div class="mb-3">
          <label for="uid" class="form-label">UID</label>
          <input
            type="text"
            class="form-control"
            id="uid"
            name="UID"
            placeholder="Votre UID"
            required
          />
        </div>

        <div class="mb-3">
          <label for="pseudo" class="form-label">Pseudo</label>
          <input
            type="text"
            class="form-control"
            id="pseudo"
            name="Pseudo"
            placeholder="Votre pseudo"
            required
          />
        </div>

        <div class="mb-3">
          <label for="telephone" class="form-label">Téléphone</label>
          <input
            type="tel"
            class="form-control"
            id="telephone"
            name="Telephone"
            placeholder="+261 34 12 345 67"
            pattern="[0-9+()\-\s]{6,}"
            required
          />
        </div>

        <div class="mb-3">
          <label for="quantity" class="form-label">Quantité</label>
          <input
            type="number"
            class="form-control"
            id="quantity"
            name="Quantity"
            min="1"
            step="1"
            value="1"
            required
          />
        </div>

        <div class="mb-3">
          <label for="payment_method" class="form-label">Mode de preuve</label>
          <select
            class="form-select"
            id="payment_method"
            name="Payment_proof_method"
            required
          >
            <option value="">Choisir...</option>
            <option value="Référence de transaction">Référence de transaction</option>
            <option value="Capture d'écran">Capture d'écran</option>
          </select>
        </div>

        <div class="mb-3" id="transaction_block" style="display: none;">
          <label for="transaction_ref" class="form-label">Référence de transaction</label>
          <input
            type="text"
            class="form-control"
            id="transaction_ref"
            name="Transaction_reference"
            placeholder="Ex : TRX12345"
          />
        </div>

        <div class="mb-3" id="screenshot_block" style="display: none;">
          <label for="screenshot" class="form-label">Capture d'écran</label>
          <input
            class="form-control"
            type="file"
            id="screenshot"
            name="Screenshot"
            accept="image/*,.png,.jpg,.jpeg,.gif,.webp"
          />
        </div>

        <div class="mb-3">
          <label for="note" class="form-label">Remarque</label>
          <textarea
            class="form-control"
            id="note"
            name="Note"
            rows="4"
            placeholder="Message ou précision (optionnel)"
          ></textarea>
        </div>

        <div class="d-flex justify-content-end">
          <button type="submit" class="btn btn-primary btn-submit">
            Envoyer la commande
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      const paymentSelect = document.getElementById("payment_method");
      const trxBlock = document.getElementById("transaction_block");
      const screenshotBlock = document.getElementById("screenshot_block");
      const trxInput = document.getElementById("transaction_ref");
      const screenshotInput = document.getElementById("screenshot");

      function updateProofFields() {
        const val = paymentSelect.value;

        if (val === "Référence de transaction") {
          trxBlock.style.display = "";
          screenshotBlock.style.display = "none";
          trxInput.required = true;
          screenshotInput.required = false;
          screenshotInput.value = "";
        } else if (val === "Capture d'écran") {
          trxBlock.style.display = "none";
          screenshotBlock.style.display = "";
          trxInput.required = false;
          screenshotInput.required = true;
          trxInput.value = "";
        } else {
          trxBlock.style.display = "none";
          screenshotBlock.style.display = "none";
          trxInput.required = false;
          screenshotInput.required = false;
          trxInput.value = "";
          screenshotInput.value = "";
        }
      }

      function updatePack() {
        const params = new URLSearchParams(window.location.search);
        const pack = params.get("pack");
        const packHidden = document.getElementById("pack_hidden");
        const packDisplay = document.getElementById("pack_display");
        const packBox = document.getElementById("pack_box");

        if (pack) {
          packHidden.value = pack + " 💎";
          packDisplay.textContent = pack + " 💎";
          packBox.style.display = "block";
        } else {
          packHidden.value = "";
          packDisplay.textContent = "";
          packBox.style.display = "none";
        }
      }

      paymentSelect.addEventListener("change", updateProofFields);
      document.addEventListener("DOMContentLoaded", function () {
        updateProofFields();
        updatePack();
      });

      Array.prototype.slice
        .call(document.querySelectorAll(".needs-validation"))
        .forEach(function (formEl) {
          formEl.addEventListener(
            "submit",
            function (event) {
              if (!formEl.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
              }
              formEl.classList.add("was-validated");
            },
            false
          );
        });
    })();
  </script>
</body>
  </html>
