<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Secure Shop</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #4fc3f7, #b388ff);
  }

  /* Barre du haut */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #6c63ff;
    padding: 10px;
    position: relative;
  }

  .topbar button {
    background: none;
    border: none;
    font-size: 20px;
    margin-left: 10px;
    cursor: pointer;
    color: black;
  }

  /* Panneaux pop-up */
  .panel {
    display: none;
    position: absolute;
    top: 60px;
    right: 10px;
    width: 300px;
    background: white;
    border-radius: 10px;
    padding: 15px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    z-index: 10;
  }

  .panel h3 {
    margin-top: 0;
  }

  /* Boutons Top Up / Abonnement */
  .main-buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px 0;
  }

  .main-buttons button {
    padding: 15px 25px;
    border: none;
    border-radius: 10px;
    background: #00ffff;
    color: black;
    font-size: 18px;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- Barre du haut -->
<div class="topbar">
  <span>FF Secure Shop 💎</span>
  <div>
    <button id="darkModeBtn">🌙</button>
    <button id="historyBtn">⏰</button>
    <button id="accountBtn">👤</button>
    <button id="cartBtn">🛒</button>
  </div>
</div>

<!-- Panneaux pop-up -->
<div id="historyPanel" class="panel">
  <h3>Historique</h3>
  <p>Votre historique sera affiché ici.</p>
</div>

<div id="accountPanel" class="panel">
  <h3>Compte</h3>
  <p>Inscription / Connexion</p>
</div>

<div id="cartPanel" class="panel">
  <h3>Panier</h3>
  <p>Votre panier est vide pour le moment.</p>
</div>

<!-- Contenu principal -->
<div style="text-align:center; padding:20px;">
  <h1>Bienvenue sur FF Secure Shop 💎</h1>
  <p>⚡ Livraison rapide • 💎 Top Up instantané • 🔥 Abonnements disponibles</p>
  <div class="main-buttons">
    <button>Top Up</button>
    <button>Abonnement</button>
  </div>
  <p>Paiement : Orange Money • Mvola</p>
</div>

<script>
  // Fonction pour ouvrir/fermer les panneaux
  function togglePanel(buttonId, panelId) {
    const button = document.getElementById(buttonId);
    const panel = document.getElementById(panelId);
    button.addEventListener('click', () => {
      // Fermer les autres panels
      document.querySelectorAll('.panel').forEach(p => {
        if (p !== panel) p.style.display = 'none';
      });
      // Ouvrir/fermer celui-ci
      panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    });
  }

  togglePanel('historyBtn', 'historyPanel');
  togglePanel('accountBtn', 'accountPanel');
  togglePanel('cartBtn', 'cartPanel');

  // Mode sombre simple
  const darkModeBtn = document.getElementById('darkModeBtn');
  darkModeBtn.addEventListener('click', () => {
    document.body.style.background = document.body.style.background.includes('#000') 
      ? 'linear-gradient(180deg, #4fc3f7, #b388ff)' 
      : 'linear-gradient(180deg, #000000, #333333)';
  });
</script>

</body>
</html>
