<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reload Prime</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #070b14;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 380px;
      background: #111827;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
    }

    .auth-card h1 {
      margin: 0 0 6px;
      font-size: 24px;
      text-align: center;
    }

    .auth-card p {
      margin: 0 0 20px;
      color: #9ca3af;
      font-size: 14px;
      text-align: center;
    }

    .field-wrap {
      position: relative;
      margin-bottom: 13px;
    }

    input {
      width: 100%;
      height: 48px;
      border: 1px solid #2f3a4f;
      border-radius: 12px;
      padding: 0 14px;
      background: #0b1220;
      color: #ffffff;
      font-size: 15px;
      outline: none;
    }

    input::placeholder {
      color: #7b8496;
    }

    input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    input.show-alert {
      border-color: #fb7185;
      color: #fb7185;
    }

    input.show-alert::placeholder {
      color: #fb7185;
      opacity: 1;
    }

    .btn {
      width: 100%;
      height: 48px;
      border: 0;
      border-radius: 12px;
      color: #ffffff;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      margin-top: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #06b6d4, #2563eb);
    }

    .btn-logout {
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      display: none;
    }

    .status {
      display: none;
      margin-top: 13px;
      padding: 11px;
      border-radius: 12px;
      background: rgba(34, 197, 94, 0.12);
      color: #86efac;
      text-align: center;
      font-size: 14px;
    }

    .logout-box {
      display: none;
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      background: #0b1220;
      border: 1px solid #243047;
      text-align: center;
    }

    .logout-box p {
      margin-bottom: 12px;
      color: #e5e7eb;
    }

    .logout-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-cancel {
      background: #374151;
    }

    .btn-confirm {
      background: #dc2626;
    }
  </style>
</head>
<body>

  <main class="auth-card">
    <h1>Reload Prime</h1>
    <p>Connexion / inscription</p>

    <form id="authForm" novalidate autocomplete="off">
      <div class="field-wrap">
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Nom"
          data-placeholder="Nom"
          data-alert="Veuillez entrer votre nom"
          required
          autocomplete="off"
        />
      </div>

      <div class="field-wrap">
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Email"
          data-placeholder="Email"
          data-alert="Veuillez entrer votre email"
          required
          autocomplete="off"
        />
      </div>

      <div class="field-wrap">
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Mot de passe"
          data-placeholder="Mot de passe"
          data-alert="Veuillez entrer votre mot de passe"
          required
          autocomplete="new-password"
        />
      </div>

      <div class="field-wrap">
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          placeholder="Confirmer le mot de passe"
          data-placeholder="Confirmer le mot de passe"
          data-alert="Veuillez confirmer votre mot de passe"
          required
          autocomplete="new-password"
        />
      </div>

      <button type="submit" class="btn btn-primary">Continuer</button>
    </form>

    <button id="logoutButton" type="button" class="btn btn-logout">Se déconnecter</button>

    <div id="status" class="status">Connecté avec succès.</div>

    <div id="logoutBox" class="logout-box">
      <p>Voulez-vous vraiment vous déconnecter ?</p>
      <div class="logout-actions">
        <button id="cancelLogout" type="button" class="btn btn-cancel">Annuler</button>
        <button id="confirmLogout" type="button" class="btn btn-confirm">Oui</button>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById("authForm");
    const fields = form.querySelectorAll("input[required]");
    const logoutButton = document.getElementById("logoutButton");
    const logoutBox = document.getElementById("logoutBox");
    const cancelLogout = document.getElementById("cancelLogout");
    const confirmLogout = document.getElementById("confirmLogout");
    const statusBox = document.getElementById("status");

    function showFieldAlert(field) {
      field.value = "";
      field.placeholder = field.dataset.alert || "Veuillez remplir ce champ";
      field.classList.add("show-alert");
    }

    function clearFieldAlert(field) {
      field.placeholder = field.dataset.placeholder || "";
      field.classList.remove("show-alert");
    }

    function clearAllFields() {
      fields.forEach((field) => {
        field.value = "";
        clearFieldAlert(field);
      });
      form.reset();
    }

    fields.forEach((field) => {
      field.addEventListener("focus", () => clearFieldAlert(field));
      field.addEventListener("input", () => clearFieldAlert(field));
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      let firstEmptyField = null;

      fields.forEach((field) => {
        if (!field.value.trim()) {
          showFieldAlert(field);
          if (!firstEmptyField) firstEmptyField = field;
        }
      });

      if (firstEmptyField) {
        firstEmptyField.focus();
        return;
      }

      statusBox.style.display = "block";
      logoutButton.style.display = "block";
    });

    logoutButton.addEventListener("click", () => {
      logoutBox.style.display = "block";
    });

    cancelLogout.addEventListener("click", () => {
      logoutBox.style.display = "none";
    });

    confirmLogout.addEventListener("click", () => {
      clearAllFields();
      statusBox.style.display = "none";
      logoutButton.style.display = "none";
      logoutBox.style.display = "none";
    });
  </script>
</body>
</html>
