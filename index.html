<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FF Secure Shop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #6ec0ff, #9b6eff);
      color: #000;
      transition: background 0.3s, color 0.3s;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: #4aa0ff;
    }
    header .icons {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    header .icons img, header .icons i {
      width: 30px;
      height: 30px;
      cursor: pointer;
    }
    .container {
      text-align: center;
      padding: 30px 10px;
    }
    .container h1 {
      margin-bottom: 10px;
    }
    .info {
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 20px;
      display: inline-block;
    }
    .btn-group {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 15px;
    }
    .btn {
      background-color: #00f0ff;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn:hover {
      transform: scale(1.05);
    }
    .payment {
      margin-bottom: 20px;
      font-weight: bold;
    }
    footer {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 20px 0;
    }
    footer img {
      width: 40px;
      height: 40px;
      cursor: pointer;
    }
    /* Mode sombre */
    body.dark {
      background: #121212;
      color: #fff;
    }
    body.dark .info {
      background: rgba(255,255,255,0.1);
    }
    body.dark .btn {
      background-color: #00c0ff;
      color: #000;
    }
  </style>
</head>
<body>

<header>
  <div class="menu">
    <i class="menu-icon">☰</i>
  </div>
  <div class="icons">
    <i id="darkModeToggle">🌙</i>
    <i id="history">⏰</i>
    <i id="account">👤</i>
    <i id="cart">🛒</i>
  </div>
</header>

<div class="container">
  <h1>Bienvenue sur FF Secure Shop 💎</h1>
  <div class="info">heure d’ouverture • 💎 Top Up instantané • 🔥 Abonnements disponibles</div>

  <div class="btn-group">
    <button class="btn" onclick="location.href='topup.html'">Top Up</button>
    <button class="btn" onclick="location.href='abonnement.html'">Abonnement</button>
  </div>

  <div class="payment">Paiement : Orange Money • Mvola</div>

  <footer>
    <a href="https://www.facebook.com/ffsecureshop2026" target="_blank">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_(2019).png" alt="Facebook">
    </a>
    <a href="https://m.me/ffsecureshop2026" target="_blank">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Messenger_logo_2020.svg" alt="Messenger">
    </a>
  </footer>
</div>

<script>
  // Mode sombre
  const darkToggle = document.getElementById('darkModeToggle');
  darkToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark');
  });

  // Historique
  const historyBtn = document.getElementById('history');
  historyBtn.addEventListener('click', () => {
    window.location.href = 'historique.html';
  });

  // Compte
  const accountBtn = document.getElementById('account');
  accountBtn.addEventListener('click', () => {
    window.location.href = 'compte.html';
  });

  // Panier
  const cartBtn = document.getElementById('cart');
  cartBtn.addEventListener('click', () => {
    window.location.href = 'panier.html';
  });
</script>

</body>
</html>
