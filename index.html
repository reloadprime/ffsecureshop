
<div class="commande-box">
  <h2>Commander vos diamants 💎</h2>

  <form action="https://usebasin.com/f/974414d6abc4" method="POST" enctype="multipart/form-data">
    <label for="uid">UID</label>
    <input type="text" id="uid" name="uid">

    <label for="pseudo">Pseudo</label>
    <input type="text" id="pseudo" name="pseudo">

    <label for="telephone">Téléphone</label>
    <input type="tel" id="telephone" name="telephone">

    <label for="quantity">Quantité</label>
    <input type="number" id="quantity" name="quantity">

    <label for="payment_proof_method">Mode de preuve</label>
    <select id="payment_proof_method" name="payment_proof_method">
      <option value="bank_transfer">Bank Transfer</option>
      <option value="mobile_money">Mobile Money</option>
      <option value="card">Card</option>
      <option value="other">Other</option>
    </select>

    <label for="transaction_reference">Référence de transaction</label>
    <input type="text" id="transaction_reference" name="transaction_reference">

    <label for="screenshot">Capture d'écran</label>
    <input type="file" id="screenshot" name="screenshot" accept="image/*">

    <label for="note">Remarque</label>
    <textarea id="note" name="note"></textarea>

    <button type="submit">Envoyer la commande</button>
  </form>
</div>
